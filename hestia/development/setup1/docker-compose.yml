services:
  otc:
    container_name: otc
    image: otel/opentelemetry-collector-contrib:0.137.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./config.yaml:/etc/otelcol/config.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "2"
    environment:
      TZ: Europe/Berlin
    networks:
      - apmnet

  prometheus:
    image: prom/prometheus:v3.11.2-busybox
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
#      - '--enable-feature=otlp-write-receiver'
      - '--enable-feature=exemplar-storage'
      - '--web.enable-otlp-receiver'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'   # curl -X POST http://localhost:9090/-/reload
      - '--web.external-url=http://grafana:9090'
    ports:
      - "9090:9090"
    environment:
      TZ: Europe/Berlin
    volumes:
      -  ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./rules:/etc/prometheus/rules
      - prometheusdata:/prometheus
    networks:
      - apmnet

  alertmanager:
    image: prom/alertmanager:v0.33.1
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://grafana:9093'
    ports:
      - "9093:9093"
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - apmnet

  tempo:
    image: grafana/tempo:2.10.4
    container_name: tempo
    command: -config.file=/etc/tempo.yaml
    user: root
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempodata:/tmp/tempo
    ports:
      - "3200:3200"
    environment:
      TZ: Europe/Berlin
    networks:
      - apmnet
      
volumes:
  prometheusdata:
  tempodata:

networks:
  apmnet:
    external: true
