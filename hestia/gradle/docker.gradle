docker {
    javaApplication {
        ports = [ 8080 ]
        baseImage = 'eclipse-temurin:17.0.7_7-jre-alpine'
        images = [ findProperty('dockerreg') + (findProperty('image') ?: project.name) ]
        maintainer = 'gastendonk'
        mainClassName = application.mainClass
    }
}

dockerBuildImage {
    doFirst {
        if (!findProperty('dockerreg')) {
            throw new GradleException('Please specify -Pdockerreg=...')
        }
    }
}

dockerCreateDockerfile {
    outputs.upToDateWhen { false }
    doLast {
        copy {
            from 'otelcol-contrib/linux'
            into 'build/docker'
        }
        def dockerfile = destFile.get().asFile
        dockerfile.text = dockerfile.text.replace('WORKDIR', 'RUN apk add bash nano\n' +
            'ENV TZ=Europe/Berlin\n' +
//            'COPY otelcol-contrib /app/otel/\n' +
            'WORKDIR').replace('8080', '4317 4318 8888 8080')
    }
}
