{{master: master}}

<div class="row"> 
    <div class="col-lg-12">
        <h1 class="page-header">{{header}}</h1>

        <form class="form-horizontal" method="post">
            <fieldset>
                <div class="form-group">
                    <label for="name" class="col-lg-1 control-label">{{N.Name}}</label>
                    <div class="col-lg-2">
                        <input autofocus type="text" class="form-control" id="name" name="name" value="{{name}}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="customer" class="col-lg-1 control-label">{{N.Customer}}</label>
                    <div class="col-lg-2">
                        <select autofocus class="form-control" id="customer" name="customer">
                            {{each a in customers}}
                                <option{{if a.selected}} selected{{/if}}>{{a.text}}</option>
                            {{/each}}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="customerKey" class="col-lg-1 control-label">{{N.CustomerKey}}</label>
                    <div class="col-lg-2">
                        <input type="text" class="form-control" id="customerKey" name="customerKey" value="{{customerKey}}">
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-lg-3 col-lg-offset-1">
                        <div class="checkbox">
                            <label>
                                <input type="checkbox" id="active" name="active"{{if active}} checked{{/if}}>
                                {{N.active}}
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-lg-offset-1 col-lg-5">
                        <button type="submit" class="btn btn-primary br">{{N.Save}}</button>
                        <a href="/{{branch}}" class="btn btn-default">{{N.Cancel}}</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</div>
