{{master: master}}

<div class="row"> 
    <div class="col-lg-12">
        <h1 class="page-header">{{header}}</h1>

        <form class="form-horizontal" method="post">
            <fieldset>
                <div class="form-group">
                    <label for="customerKey" class="col-lg-1 control-label">{{N.CustomerKey}}</label>
                    <div class="col-lg-3">
                        <select class="form-control" id="customerKey" name="customerKey" autofocus>
                            {{each a in customerKeys}}
                                <option{{if a.selected}} selected{{/if}}>{{a.text}}</option>
                            {{/each}}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tag" class="col-lg-1 control-label">tag</label>
                    <div class="col-lg-2">
                        <select class="form-control" id="tag" name="tag">
                            {{each a in tags}}
                                <option{{if a.selected}} selected{{/if}}>{{a.text}}</option>
                            {{/each}}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-lg-offset-1 col-lg-5">
                        <button type="submit" class="btn btn-primary br">{{N.Auslieferung}}</button>
                        <a href="/{{branch}}" class="btn btn-default">{{N.Cancel}}</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</div>
