{{master: master}}

<div class="row"> 
    <div class="col-lg-12">
        <h1 class="page-header">{{header}}</h1>

        <form class="form-horizontal" method="post" action="/{{branch}}/mt/{{id}}/add?m={{m}}">
            <fieldset>
                <div class="form-group">
                    <label for="f1" class="col-lg-1 control-label">{{N.Name}}</label>
                    <div class="col-lg-3">
                        <input autofocus type="text" class="form-control" id="f1" name="f1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="f2" class="col-lg-1 control-label">{{f2label}}</label>
                    <div class="col-lg-3">
                        <input type="text" class="form-control" id="f2" name="f2">
                    </div>
                </div>
                {{if f3label}}
	                <div class="form-group">
	                    <label for="f3" class="col-lg-1 control-label">{{f3label}}</label>
	                    <div class="col-lg-3">
	                        <input type="text" class="form-control" id="f3" name="f3">
	                    </div>
	                </div>
                {{/if}}
                {{if f4label}}
	                <div class="form-group">
	                    <label for="f4" class="col-lg-1 control-label">{{f4label}}</label>
	                    <div class="col-lg-3">
	                        <input type="password" class="form-control" id="f4" name="f4">
	                    </div>
	                </div>
                {{/if}}

                <div class="form-group">
                    <div class="col-lg-offset-1 col-lg-5">
                        <button type="submit" class="btn btn-primary br">{{N.Save}}</button>
                        <a href="/{{branch}}/mt/{{id}}" class="btn btn-default">{{N.Cancel}}</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</div>
