{{master: master}}

<div class="row"> 
    <div class="col-lg-12">
        <h1 class="page-header">X bearbeiten</h1>

        <form class="form-horizontal" method="post">
            <fieldset>
                <div class="form-group">
                    <label for="customer" class="col-lg-1 control-label">Customer</label>
                    <div class="col-lg-3">
                        <select autofocus class="form-control" id="customer" name="customer">
                            {{each a in customers}}
                                <option{{if a.selected}} selected{{/if}}>{{a.text}}</option>
                            {{/each}}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tag" class="col-lg-1 control-label">tag</label>
                    <div class="col-lg-3">
                        <input type="text" class="form-control" id="tag" name="tag" value="{{tag}}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="update" class="col-lg-1 control-label">{{UpdateNo}}</label>
                    <div class="col-lg-3">
                        <input type="text" class="form-control" id="update" name="update" value="{{update}}">
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-lg-offset-1 col-lg-5">
                        <button type="submit" class="btn btn-primary br">{{N.CreateTag}}</button>
                        <a href="/{{branch}}" class="btn btn-default">{{N.Cancel}}</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</div>
