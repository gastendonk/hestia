{{master: master}}

<div class="row"> 
    <div class="col-lg-12">
        <h1 class="page-header">Status</h1>

        <p>webapp run mode: "{{info}}"</p>
        
        <p>
            OTC process pid: <b>{{pid}}</b>
            {{if alive}}<span class="badge" style="background-color: #0c0; margin-left: 2em;">otc is
            alive</span>{{else}}<span class="badge" style="background-color: #f00; margin-left: 2em;">otc is not running{{/if}}</span>
        </p>
        <p>info 1: {{info1}}</p>
        <p>info 2: {{info2}}</p>
        
        <p>Health check status code: {{status}}</p>
        
        <pre>{{config}}</pre>
        
        <hr>
        <p>
            <a href="/otc/kill" class="btn btn-danger br">Kill OTC</a>
            <a href="/otc/kill?m=s" class="btn btn-success">Restart OTC</a>
        </p>
        
        <hr>
        <p><small>{{datetime}}</small></p>
    </div>
</div>
