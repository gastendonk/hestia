{{master: master}}

<div class="row"> 
    <div class="col-lg-12">
        <h1 class="page-header">{{header}}</h1>

        <form class="form-horizontal" method="post">
            <fieldset>
                <div class="form-group">
                    <label for="alert" class="col-lg-1 control-label">ID</label>
                    <div class="col-lg-3">
                        <input autofocus type="text" class="form-control" id="alert" name="alert">
                        <small>{{alertHint}}</small>
                    </div>
                </div>
                <div class="form-group">
                    <label for="summary" class="col-lg-1 control-label">{{N.Summary}}</label>
                    <div class="col-lg-3">
                        <input type="text" class="form-control" id="summary" name="summary">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description" class="col-lg-1 control-label">{{N.Description}}</label>
                    <div class="col-lg-3">
                        <textarea class="form-control" rows="4" id="description" name="description"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label for="expr" class="col-lg-1 control-label">Expression</label>
                    <div class="col-lg-6">
                        <input type="text" class="form-control" id="expr" name="expr">
                    </div>
                </div>
                <div class="form-group">
                    <label for="durationFor" class="col-lg-1 control-label">for</label>
                    <div class="col-lg-1">
                        <input type="text" class="form-control" id="durationFor" name="durationFor">
                    </div>
                    <label for="keepFiringFor" class="col-lg-1 control-label">keep firing for</label>
                    <div class="col-lg-1">
                        <input type="text" class="form-control" id="keepFiringFor" name="keepFiringFor">
                    </div>
                </div>

                <div class="form-group">
                    <div class="col-lg-offset-1 col-lg-5">
                        <button type="submit" class="btn btn-primary br">{{N.Save}}</button>
                        <a href="/{{branch}}/alert/{{env}}" class="btn btn-default">{{N.Cancel}}</a>
                    </div>
                </div>
            </fieldset>
        </form>
    </div>
</div>
